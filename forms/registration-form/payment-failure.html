<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Payment Failed — Raffles University</title>
    <link rel="stylesheet" href="registration-form.css" />
</head>
<body>
    <main class="container">
        <div class="success-screen active">
            <div class="success-checkmark">✕</div>
            <h2>Payment Failed</h2>
            <p>We could not complete your payment. Please try again or choose another payment method.</p>
            <button type="button" class="btn btn-primary" id="retry-btn">Retry Payment</button>
        </div>
    </main>
    <script>
            document.getElementById('retry-btn').addEventListener('click', () => {
                window.location.href = 'index.html';
            });
    </script>
</body>
</html>
