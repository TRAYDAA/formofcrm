<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Payment Failed — Raffles University</title>
    <link rel="stylesheet" href="registration-style.css" />
</head>
<body>
    <main class="container">
        <!-- Brand Header -->
        <header class="brand">
            <img src="logo.png" alt="Raffles University logo" class="logo">
            <h1 class="form-title">Student Registration Form</h1>
        </header>

        <!-- Form Card -->
        <div class="form-card">
            <div class="success-screen active">
                <div class="success-checkmark" style="background: linear-gradient(135deg, var(--danger), #f87171); box-shadow: 0 8px 24px rgba(239, 68, 68, 0.3);">✕</div>
                <h2 style="color: var(--danger);">Payment Failed</h2>
                <p>We could not complete your payment. Please try again or choose another payment method.</p>
                <button type="button" class="btn btn-primary" id="retry-btn" style="margin-top: 28px; background: linear-gradient(135deg, var(--danger), #f87171); box-shadow: 0 2px 8px rgba(239, 68, 68, 0.25);">Retry Payment</button>
            </div>
        </div>
    </main>
    <script>
            document.getElementById('retry-btn').addEventListener('click', () => {
                window.location.href = 'index.html';
            });
    </script>
</body>
</html>
