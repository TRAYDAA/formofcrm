<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Payment Successful — Raffles University</title>
    <link rel="stylesheet" href="registration-style.css" />
</head>
<body>
    <main class="container">
        <!-- Brand Header -->
        <header class="brand">
            <img src="logo.png" alt="Raffles University logo" class="logo">
            <h1 class="form-title">Student Registration Form</h1>
        </header>

        <!-- Form Card -->
        <div class="form-card">
            <div class="success-screen active">
                <div class="success-checkmark">✓</div>
                <h2>Payment Successful!</h2>
                <p>Your payment has been verified. Thank you for completing the transaction.</p>
                <p id="payment-info" style="margin-top: 16px; font-weight: 600; color: var(--accent); font-family: monospace; font-size: 14px;"></p>
                <button type="button" class="btn btn-primary" id="continue-btn" style="margin-top: 28px;">Continue Application</button>
            </div>
        </div>
    </main>
    <script>
        // Extract registrationId from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const urlRegId = urlParams.get('registrationId') || urlParams.get('registrationID');

        if (urlRegId) {
            localStorage.setItem('registrationId', urlRegId);
        }

        const registrationId = urlRegId || localStorage.getItem('registrationId');
        const info = document.getElementById('payment-info');

        if (registrationId) {
            info.textContent = 'Registration ID: ' + registrationId;
        } else {
            info.textContent = 'Unable to retrieve registration details from this browser session.';
        }

        document.getElementById('continue-btn').addEventListener('click', () => {
            if (registrationId) {
                window.location.href = `index.html?registrationId=${registrationId}&step=2`;
            } else {
                info.textContent = 'Unable to continue. Active registration session not found.';
            }
        });
    </script>
</body>
</html>
