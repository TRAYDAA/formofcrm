<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Lead Form</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="website-style.css">
</head>
<body>
    <div class="shield-container">
        <div class="shield-form">
            <div class="shield-icon book-icon" title="Education">📚</div>
            <div class="shield-icon knight-icon" title="Excellence">♞</div>
            <div class="shield-header">
                <h2>RAFFLES UNIVERSITY</h2>
            </div>
            <form id="websiteForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Primary Phone <span class="required">*</span></label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="form-group">
                    <label for="alternatePhone">Alternate Phone</label>
                    <input type="tel" id="alternatePhone" name="alternatePhone">
                </div>
                <div class="form-group">
                    <label for="course">Course Interest</label>
                    <select id="course" name="course">
                        <option value="">Select Course</option>
                        <option value="BA LLB">BA LLB</option>
                        <option value="BBA LLB">BBA LLB</option>
                        <option value="LLB">LLB</option>
                        <option value="LLM">LLM</option>
                        <option value="DIPLOMA">DIPLOMA</option>
                        <option value="BCA">BCA</option>
                        <option value="B.TECH">B.TECH</option>
                        <option value="MCA">MCA</option>
                        <option value="M.TECH">M.TECH</option>
                        <option value="B.SC">B.SC</option>
                        <option value="M.SC">M.SC</option>
                        <option value="B.SC (AGRICULTURE)">B.SC (AGRICULTURE)</option>
                        <option value="B.COM">B.COM</option>
                        <option value="BBA">BBA</option>
                        <option value="M.COM">M.COM</option>
                        <option value="MBA">MBA</option>
                        <option value="D.PHARM">D.PHARM</option>
                        <option value="B.PHARM">B.PHARM</option>
                        <option value="M.PHARM">M.PHARM</option>
                        <option value="B.A (HONS)">B.A (HONS)</option>
                        <option value="B.A (GEN)">B.A (GEN)</option>
                        <option value="M.A">M.A</option>
                        <option value="BA/BBA LLB">BA/BBA LLB</option>
                    </select>
                </div>
                <button type="submit" class="btn shield-btn">Submit</button>
            </form>
        </div>
    </div>
    <script src="forms.js"></script>
</body>
</html>
