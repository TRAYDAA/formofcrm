<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Application Form — Raffles University</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="container">
        <header class="brand">
            <img src="logo.png" alt="Raffles University logo" class="logo">
        </header>

        <form class="form" action="#" method="post" novalidate>
            <div class="form-grid">
                <div class="col">
                    <label class="field">
                        <span class="label-text">Student Name</span>
                        <input type="text" name="student_name" placeholder="" required>
                    </label>

                    <label class="field">
                        <span class="label-text">Email*</span>
                        <input type="email" name="email" required>
                    </label>

                    <label class="field">
                        <span class="label-text">School *</span>
                        <select name="school" id="school-select" required>
                            <option value="">Select</option>
                            <option>SCHOOL OF LAW</option>
                            <option>SCHOOL OF ENGINEERING &amp; TECHNOLOGY</option>
                            <option>SCHOOL OF BASIC &amp; APPLIED SCIENCE</option>
                            <option>SCHOOL OF AGRICULTURAL SCIENCE</option>
                            <option>ALABBAR SCHOOL OF MANAGEMENT</option>
                            <option>SCHOOL OF PHARMACY</option>
                            <option>SCHOOL OF HUMANITIES &amp; SOCIAL SCIENCE</option>
                            <option>RESEARCH</option>
                        </select>
                    </label>

                    <label class="field">
                        <span class="label-text">Country</span>
                        <select name="country" id="country-select" required>
                            <option value="">Loading countries...</option>
                        </select>
                    </label>

                    <label class="field">
                        <span class="label-text">State</span>
                        <select name="state" id="state-select" required disabled>
                            <option value="">Select Country first</option>
                        </select>
                    </label>
                </div>

                <div class="col">
                    <label class="field">
                        <span class="label-text">Mobile*</span>
                        <input type="tel" name="mobile" pattern="[0-9]{10}" required placeholder="10-digit number">
                    </label>

                    <label class="field">
                        <span class="label-text">Discipline *</span>
                        <select name="discipline" required>
                            <option value="">Select</option>
                            <option>UG</option>
                            <option>PG</option>
                            <option>PhD</option>
                            <option>Diploma</option>
                        </select>
                    </label>

                    <label class="field">
                        <span class="label-text">Course *</span>
                        <select name="course" id="course-select" required disabled>
                            <option value="">Select School first</option>
                        </select>
                    </label>

                    <label class="field">
                        <span class="label-text">City</span>
                        <select name="city" id="city-select" required disabled>
                            <option value="">Select State first</option>
                        </select>
                    </label>
                </div>
            </div>

            <label class="checkbox"><input type="checkbox" required> I agree to the <a href="#">Terms and
                    Conditions</a>.</label>

            <div class="actions">
                <button type="submit" class="btn">Register</button>
            </div>
        </form>
    </main>
    <script>
        const countrySelect = document.getElementById('country-select');
        const stateSelect = document.getElementById('state-select');
        const citySelect = document.getElementById('city-select');
        const schoolSelect = document.getElementById('school-select');
        const courseSelect = document.getElementById('course-select');

        const schoolCoursesMap = {
            "SCHOOL OF LAW": [
                "BA LL.B(Hons.)",
                "BBA LL.B(Hons.)",
                "LL.B",
                "LL.M in Maritime Law",
                "LL.M",
                "Ph.D in LAW"
            ],
            "ALABBAR SCHOOL OF MANAGEMENT": [
                "MBA Dual Specialization",
                "BBA",
                "BBA Digital Marketing",
                "B.Com",
                "M.Com",
                "Ph.D in Management",
                "Ph.D in Commerce"
            ],
            "SCHOOL OF ENGINEERING & TECHNOLOGY": [
                "B.Tech",
                "M.Tech",
                "Bachelor of Computer Applications (BCA)",
                "Master of Computer Applications (MCA)",
                "Diploma",
                "Ph.D in CSE, EE, ECE & ME"
            ],
            "SCHOOL OF BASIC & APPLIED SCIENCE": [
                "B.Sc. ( PCM, CBZ, MPCs )",
                "M.Sc.(Physics, Chemistry, Zoology, Botany and Mathematics)",
                "Ph.D.(Physics, Chemistry, Zoology, Botany and Mathematics)"
            ],
            "SCHOOL OF AGRICULTURAL SCIENCE": [
                "B.Sc. Agriculture (Hons.)"
            ],
            "SCHOOL OF PHARMACY": [
                "D.Pharm",
                "B.Pharm",
                "M.Pharm (Pharmaceutics)",
                "Ph.D. in Pharmacy"
            ],
            "SCHOOL OF HUMANITIES & SOCIAL SCIENCE": [
                "B.A. (General - Any Three Subjects)",
                "M.A. in English, Economics, Sociology and Political Science",
                "Ph.D in English, Economics, Sociology, Political Science, Psychology"
            ]
        };

        let countriesData = [];

        function clearSelect(sel, placeholder) {
            while (sel.firstChild) sel.removeChild(sel.firstChild);
            const ph = document.createElement('option'); 
            ph.value = ''; 
            ph.textContent = placeholder; 
            sel.appendChild(ph);
        }

        async function fetchCountriesAndStates() {
            try {
                const response = await fetch('https://countriesnow.space/api/v0.1/countries/states');
                const json = await response.json();
                if (!json.error) {
                    countriesData = json.data;
                    clearSelect(countrySelect, 'Select Country');
                    
                    // Sort countries alphabetically
                    countriesData.sort((a, b) => a.name.localeCompare(b.name)).forEach(country => {
                        const option = document.createElement('option');
                        option.value = country.name;
                        option.textContent = country.name;
                        countrySelect.appendChild(option);
                    });
                    
                    // Set default country to India
                    countrySelect.value = "India";
                    countrySelect.dispatchEvent(new Event("change"));
                }
            } catch (error) {
                console.error("Error fetching countries:", error);
                clearSelect(countrySelect, 'Error loading countries');
            }
        }

        async function fetchCities(countryName, stateName) {
            try {
                clearSelect(citySelect, 'Loading cities...');
                citySelect.disabled = true;
                
                const response = await fetch('https://countriesnow.space/api/v0.1/countries/state/cities', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ country: countryName, state: stateName })
                });
                
                const json = await response.json();
                clearSelect(citySelect, 'Select City');
                
                if (!json.error && json.data && json.data.length > 0) {
                    json.data.sort().forEach(city => {
                        const option = document.createElement('option');
                        option.value = city;
                        option.textContent = city;
                        citySelect.appendChild(option);
                    });
                    citySelect.disabled = false;
                } else {
                    clearSelect(citySelect, 'No cities found');
                }
            } catch (error) {
                console.error("Error fetching cities:", error);
                clearSelect(citySelect, 'Error loading cities');
            }
        }

        countrySelect.addEventListener('change', e => {
            const countryName = e.target.value;
            clearSelect(stateSelect, 'Select State');
            clearSelect(citySelect, 'Select State first');
            stateSelect.disabled = true;
            citySelect.disabled = true;

            if (countryName) {
                const country = countriesData.find(c => c.name === countryName);
                if (country && country.states && country.states.length > 0) {
                    country.states.sort((a, b) => a.name.localeCompare(b.name)).forEach(state => {
                        const option = document.createElement('option');
                        option.value = state.name;
                        option.textContent = state.name;
                        stateSelect.appendChild(option);
                    });
                    stateSelect.disabled = false;
                } else {
                    clearSelect(stateSelect, 'No states found');
                }
            }
        });

        stateSelect.addEventListener('change', e => {
            const stateName = e.target.value;
            const countryName = countrySelect.value;
            if (stateName && countryName) {
                fetchCities(countryName, stateName);
            } else {
                clearSelect(citySelect, 'Select State first');
                citySelect.disabled = true;
            }
        });

        schoolSelect.addEventListener('change', e => {
            const school = e.target.value;
            clearSelect(courseSelect, 'Select Course');
            
            if (school && schoolCoursesMap[school]) {
                courseSelect.disabled = false;
                schoolCoursesMap[school].forEach(course => {
                    const option = document.createElement('option');
                    option.value = course;
                    option.textContent = course;
                    courseSelect.appendChild(option);
                });
            } else {
                courseSelect.disabled = true;
                if (school) {
                    clearSelect(courseSelect, 'No courses available');
                } else {
                    clearSelect(courseSelect, 'Select School first');
                }
            }
        });

        // Initialize fetching
        fetchCountriesAndStates();
    </script>
</body>

</html>
